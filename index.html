<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UT Fuera de Tiempo - Promart</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f16821;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
            /* Tu imagen real incrustada como fondo de pantalla */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAoAAAAGQAQMAAADOn4CHAAAABlBMVEX///8AAABVwtN+AAAAAXRSTlMAQObYZgAAAAlwSFlzAAAOxAAADsQBlSsOGwAAADZJREFUeJztwQEBAAAAgiD7p7bEYgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAC+Bo0AAAEIsb93AAAAAElFTkSuQmCC');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.96);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 850px;
            width: 95%;
        }
        
        /* Estilos del Login */
        .login-box {
            max-width: 350px;
            margin: 0 auto;
            padding: 25px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .login-box input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
        }
        .btn-login {
            background-color: #f16821;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 98%;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-login:hover { background-color: #d85718; }

        /* Contenedor Principal de la App */
        #appContent { display: none; }

        .header-user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f16821;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-logout {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-logout:hover { background: #1a252f; }

        h1 {
            color: #f16821;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 5px;
        }
        .semana-actual-box {
            background-color: #2c3e50;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-block;
        }
        .grid-ut {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        @media(min-width: 500px) {
            .grid-ut { grid-template-columns: repeat(4, 1fr); }
        }
        .btn-ut {
            background-color: #f16821;
            color: white;
            border: none;
            padding: 15px 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .btn-ut:hover {
            background-color: #d85718;
            transform: translateY(-2px);
        }
        .btn-ut span {
            display: block;
            font-size: 11px;
            font-weight: normal;
            opacity: 0.9;
            margin-top: 4px;
        }
        .form-registro {
            display: none;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #f16821;
            margin-bottom: 20px;
        }
        .form-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-top: 15px;
        }
        .inputs-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .label-field {
            font-weight: bold;
            color: #2c3e50;
            width: 120px;
            text-align: right;
            font-size: 14px;
        }
        input[type="text"], input[type="password"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-transform: uppercase;
            text-align: center;
            width: 180px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #nvsAfectadas { color: #e74c3c; }
        input:focus { border-color: #f16821 !important; outline: none; }
        
        .btn-guardar {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 22px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 160px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .btn-guardar:hover { background-color: #27ae60; }
        
        .seccion-control-tabla {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 10px;
        }
        .filtros-box { display: flex; gap: 10px; }
        select {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #bdc3c7;
            background-color: white;
            cursor: pointer;
        }
        .btn-excel {
            background-color: #1f7244;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-excel:hover { background-color: #154c2e; }

        .tabla-contenedor {
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }
        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
        tr:nth-child(even) { background-color: #f8fafc; }

        .btn-reset {
            display: none;
            background-color: #e74c3c;
            color: white;
            border: none;
            margin-top: 20px;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            float: left;
        }
        .btn-reset:hover { background-color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="loginSection" class="login-box">
        <h2 style="color: #f16821; margin-top:0;">Acceso al Sistema</h2>
        <input type="text" id="userInput" placeholder="Usuario" style="text-transform:none; letter-spacing:0;">
        <input type="password" id="passInput" placeholder="Contraseña" style="text-transform:none; letter-spacing:0;">
        <button class="btn-login" onclick="procesarLogin()">Ingresar</button>
    </div>

    <div id="appContent">
        <div class="header-user-info">
            <span id="txtUsuarioActivo">Usuario: </span>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>

        <h1>UT Fuera de Tiempo</h1>
        
        <div class="semana-actual-box" id="infoSemanaActual">
            Cargando datos de la semana...
        </div>
        
        <div class="grid-ut">
            <button class="btn-ut" onclick="mostrarFormulario('Ate', '517')">Ate <span>(517)</span></button>
            <button class="btn-ut" onclick="mostrarFormulario('Rex', '540')">Rex <span>(540)</span></button>
            <button class="btn-ut" onclick="mostrarFormulario('CD Stol', '954')">CD Stol <span>(954)</span></button>
            <button class="btn-ut" onclick="mostrarFormulario('CD Contrans', '956')">CD Contrans <span>(956)</span></button>
        </div>

        <div id="seccionFormulario" class="form-registro">
            <h3 id="tituloFormulario" style="margin:0; color:#2c3e50; text-align: center;"></h3>
            <div class="form-layout">
                <div class="inputs-col">
                    <div class="input-row">
                        <span class="label-field">N° Placa:</span>
                        <input type="text" id="placaUT" placeholder="XXX-XXX" autocomplete="off">
                    </div>
                    <div class="input-row">
                        <span class="label-field">NVS Afectadas:</span>
                        <input type="text" id="nvsAfectadas" placeholder="" autocomplete="off">
                    </div>
                </div>
                <button class="btn-guardar" onclick="guardarRegistro()">Registrar Llegada</button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #ddd; margin: 25px 0 15px 0;">

        <div class="seccion-control-tabla">
            <div class="filtros-box">
                <select id="filtroSede" onchange="actualizarTabla()">
                    <option value="TODOS">Ver Todas las Sedes</option>
                    <option value="Ate (517)">Ate (517)</option>
                    <option value="Rex (540)">Rex (540)</option>
                    <option value="CD Stol (954)">CD Stol (954)</option>
                    <option value="CD Contrans (956)">CD Contrans (956)</option>
                </select>
                <select id="filtroSemana" onchange="actualizarTabla()"></select>
            </div>
            <button class="btn-excel" onclick="exportarExcel()">📊 Descargar Excel</button>
        </div>

        <div class="tabla-contenedor">
            <table>
                <thead>
                    <tr>
                        <th>Sede / UT</th>
                        <th>N° Placa</th>
                        <th style="text-align: center;">NVS Afectadas</th>
                        <th>Semana</th>
                        <th>Fecha y Hora</th>
                        <th>Registrado Por</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <button id="botonResetSecreto" class="btn-reset" onclick="reiniciarTodo()">Limpiar Base de Datos</button>
        <div style="clear: both;"></div>
    </div>
</div>

<script>
    let usuarioLogueado = sessionStorage.getItem('ut_user_logged_v2') || "";
    let sedeSeleccionada = "";
    let codigoSeleccionado = "";
    let historial = localStorage.getItem('historialUT_v10') ? JSON.parse(localStorage.getItem('historialUT_v10')) : [];
    let etiquetaSemanaActualGlobal = "";

    const inputPlaca = document.getElementById('placaUT');
    const inputNVS = document.getElementById('nvsAfectadas');

    verificarSesion();

    function procesarLogin() {
        const u = document.getElementById('userInput').value.trim().toUpperCase();
        const p = document.getElementById('passInput').value.trim();

        if ((u === "DESPACHO" && p === "LMO528") || (u === "ADMIN" && p === "admin")) {
            usuarioLogueado = u;
            sessionStorage.setItem('ut_user_logged_v2', u);
            verificarSesion();
        } else {
            alert("Usuario o contraseña incorrectos.");
        }
    }

    function verificarSesion() {
        if (usuarioLogueado !== "") {
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('appContent').style.display = "block";
            document.getElementById('txtUsuarioActivo').innerText = `Usuario activo: ${usuarioLogueado}`;
            
            if (usuarioLogueado === "ADMIN") {
                document.getElementById('botonResetSecreto').style.display = "block";
            } else {
                document.getElementById('botonResetSecreto').style.display = "none";
            }
            
            inicializarApp();
        } else {
            document.getElementById('loginSection').style.display = "block";
            document.getElementById('appContent').style.display = "none";
        }
    }

    function cerrarSesion() {
        usuarioLogueado = "";
        sessionStorage.removeItem('ut_user_logged_v2');
        document.getElementById('userInput').value = "";
        document.getElementById('passInput').value = "";
        verificarSesion();
    }

    function inicializarApp() {
        const infoSem = obtenerDetalleSemana();
        etiquetaSemanaActualGlobal = infoSem.etiqueta;
        construirFiltroSemanas();
        
        const selectSemana = document.getElementById('filtroSemana');
        if (opcionExiste(selectSemana, etiquetaSemanaActualGlobal)) {
            selectSemana.value = etiquetaSemanaActualGlobal;
        }
        actualizarTabla();
    }

    function opcionExiste(selectElement, value) {
        return Array.from(selectElement.options).some(option => option.value === value);
    }

    inputPlaca.addEventListener('input', function(e) {
        let valor = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); 
        if (valor.length > 6) valor = valor.substr(0, 6);
        if (valor.length > 3) {
            e.target.value = valor.substr(0, 3) + '-' + valor.substr(3);
        } else {
            e.target.value = valor;
        }
    });

    inputNVS.addEventListener('input', function(e) {
        let valor = e.target.value.replace(/[^0-9]/g, '');
        if (valor.length > 2) valor = valor.substr(0, 2);
        e.target.value = valor;
    });

    inputPlaca.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); inputNVS.focus(); }
    });

    inputNVS.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); guardarRegistro(); }
    });

    function obtenerDetalleSemana(fechaReferencia = new Date()) {
        const d = new Date(Date.UTC(fechaReferencia.getFullYear(), fechaReferencia.getMonth(), fechaReferencia.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        const numeroSemana = Math.ceil((((d - yearStart) / 86400000) + 1)/7);

        const lunes = new Date(fechaReferencia);
        const diaActual = fechaReferencia.getDay();
        const distanciaLunes = diaActual === 0 ? -6 : 1 - diaActual;
        lunes.setDate(fechaReferencia.getDate() + distanciaLunes);
        
        const domingo = new Date(lunes);
        domingo.setDate(lunes.getDate() + 6);

        const opciones = { day: 'numeric', month: 'long' };
        const rangoTexto = `(${lunes.toLocaleDateString('es-PE', opciones)} - ${domingo.toLocaleDateString('es-PE', opciones)})`;
        const etiquetaCompleta = `Semana ${numeroSemana} ${rangoTexto}`;
        
        document.getElementById('infoSemanaActual').innerText = etiquetaCompleta;
        return { numero: numeroSemana, etiqueta: etiquetaCompleta };
    }

    function mostrarFormulario(sede, code) {
        sedeSeleccionada = sede;
        codigoSeleccionado = code;
        document.getElementById('tituloFormulario').innerText = `Registrar para: ${sede} (${code})`;
        document.getElementById('seccionFormulario').style.display = "block";
        inputPlaca.value = "";
        inputNVS.value = "";
        inputPlaca.focus();
    }

    function guardarRegistro() {
        const placaValue = inputPlaca.value.trim();
        const nvsValue = inputNVS.value.trim();

        if (placaValue.length !== 7) {
            alert("Por favor, introduce una placa válida (Ej: G5T-881).");
            inputPlaca.focus();
            return;
        }

        if (nvsValue === "") {
            alert("Por favor, ingresa las NVS Afectadas.");
            inputNVS.focus();
            return;
        }

        const ahora = new Date();
        const fechaHoraFormateada = Presidential = ahora.toLocaleDateString('es-PE') + ' ' + ahora.toLocaleTimeString('es-PE', {hour: '2-digit', minute:'2-digit'});
        const infoSem = obtenerDetalleSemana(ahora);

        const nuevoRegistro = {
            sede: `${sedeSeleccionada} (${codigoSeleccionado})`,
            placa: placaValue,
            nvs: nvsValue,
            semana: `Semana ${infoSem.numero}`,
            semanaDetalle: infoSem.etiqueta,
            tiempo: fechaHoraFormateada,
            usuario: usuarioLogueado
        };

        historial.push(nuevoRegistro);
        localStorage.setItem('historialUT_v10', JSON.stringify(historial));

        construirFiltroSemanas();
        document.getElementById('filtroSemana').value = infoSem.etiqueta;
        actualizarTabla();
        
        inputPlaca.value = "";
        inputNVS.value = "";
        document.getElementById('seccionFormulario').style.display = "none";
    }

    function construirFiltroSemanas() {
        const selectSemana = document.getElementById('filtroSemana');
        const valorPrevio = selectSemana.value;
        
        let semanasUnicas = [];
        historial.forEach(item => {
            if (!semanasUnicas.includes(item.semanaDetalle)) {
                semanasUnicas.push(item.semanaDetalle);
            }
        });

        if (!semanasUnicas.includes(etiquetaSemanaActualGlobal)) {
            semanasUnicas.push(etiquetaSemanaActualGlobal);
        }

        semanasUnicas.sort();

        selectSemana.innerHTML = '<option value="TODOS">Ver Todas las Semanas</option>';
        semanasUnicas.forEach(sem => {
            const opt = document.createElement('option');
            opt.value = sem;
            opt.innerText = sem;
            selectSemana.appendChild(opt);
        });

        if (valorPrevio) selectSemana.value = valorPrevio;
        if (selectSemana.selectedIndex === -1) selectSemana.value = etiquetaSemanaActualGlobal;
    }

    function actualizarTabla() {
        const tbody = document.getElementById('cuerpoTabla');
        const filtroSede = document.getElementById('filtroSede').value;
        const filtroSemana = document.getElementById('filtroSemana').value;
        tbody.innerHTML = "";

        historial.forEach((item) => {
            const cumpleSede = (filtroSede === "TODOS" || item.sede === filtroSede);
            const cumpleSemana = (filtroSemana === "TODOS" || item.semanaDetalle === filtroSemana);

            if (cumpleSede && cumpleSemana) {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${item.sede}</td>
                    <td style="font-weight:bold; letter-spacing:0.5px;">${item.placa}</td>
                    <td style="color:#e74c3c; font-weight:bold; text-align:center;">${item.nvs}</td>
                    <td>${item.semana}</td>
                    <td>${item.tiempo}</td>
                    <td style="font-size:12px; font-weight:bold; color:#7f8c8d;">${item.usuario}</td>
                `;
                tbody.appendChild(fila);
            }
        });

        if (tbody.innerHTML === "") {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999; padding:20px;">No hay registros acumulados.</td></tr>`;
        }
    }

    function exportarExcel() {
        if (historial.length === 0) {
            alert("No hay datos para exportar.");
            return;
        }

        let csvContent = "\uFEFF"; 
        csvContent += "Sede / UT;N° Placa;NVS Afectadas;Semana;Detalle Semana;Fecha y Hora;Registrado Por\n";

        const filtroSede = document.getElementById('filtroSede').value;
        const filtroSemana = document.getElementById('filtroSemana').value;

        historial.forEach((item) => {
            const cumpleSede = (filtroSede === "TODOS" || item.sede === filtroSede);
            const cumpleSemana = (filtroSemana === "TODOS" || item.semanaDetalle === filtroSemana);

            if (cumpleSede && cumpleSemana) {
                csvContent += `"${item.sede}";"${item.placa}";"${item.nvs}";"${item.semana}";"${item.semanaDetalle}";"${item.tiempo}";"${item.usuario}"\n`;
            }
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Reporte_UT_Fuera_de_Tiempo.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function reiniciarTodo() {
        if (confirm("¿Deseas vaciar por completo TODA la base de datos acumulada históricamente?")) {
            historial = [];
            localStorage.removeItem('historialUT_v10');
            inicializarApp();
        }
    }
</script>

</body>
</html>
