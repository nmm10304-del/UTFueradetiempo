<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UT Fuera de Tiempo - Promart</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f16821;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
            background-image: linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15)), url('fondo.png');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .container {
            text-align: center;
            max-width: 850px;
            width: 95%;
        }
        
        /* Estilos del Login */
        .login-box {
            max-width: 350px;
            margin: 0 auto;
            padding: 25px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .login-box input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
        }
        .btn-login {
            background-color: #f16821;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 98%;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-login:hover { background-color: #d85718; }

        /* Contenedor Principal de la App */
        #appContent { 
            display: none; 
            background-color: rgba(255, 255, 255, 0.96);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f16821;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-logout {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-logout:hover { background: #1a252f; }

        h1 {
            color: #f16821;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 5px;
        }
        .semana-actual-box {
            background-color: #2c3e50;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-block;
        }
        .grid-ut {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        @media(min-width: 500px) {
            .grid-ut { grid-template-columns: repeat(4, 1fr); }
        }
        .btn-ut {
            background-color: #f16821;
            color: white;
            border: none;
            padding: 15px 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .btn-ut:hover {
            background-color: #d85718;
            transform: translateY(-2px);
        }
        .btn-ut span {
            display: block;
            font-size: 11px;
            font-weight: normal;
            opacity: 0.9;
            margin-top: 4px;
        }
        .form-registro {
            display: none;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #f16821;
            margin-bottom: 20px;
        }
        .form-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-top: 15px;
        }
        .inputs-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .label-field {
            font-weight: bold;
            color: #2c3e50;
            width: 120px;
            text-align: right;
            font-size: 14px;
        }
        input[type="text"], input[type="password"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-transform: uppercase;
            text-align: center;
            width: 180px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #nvsAfectadas { color: #e74c3c; text-align: center; }
        input:focus { border-color: #f16821 !important; outline: none; }
        
        .btn-guardar {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 22px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 160px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .btn-guardar:hover { background-color: #27ae60; }
        
        .seccion-control-tabla {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 10px;
        }
        .filtros-box { display: flex; gap: 10px; align-items: center; }
        
        select {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #bdc3c7;
            background-color: white;
            cursor: pointer;
        }

        /* --- DESPLEGABLE CON CHECKBOXES CON UN SOLO CLIC --- */
        .multiselect-semanas {
            position: relative;
            display: inline-block;
            text-align: left;
        }
        .select-box-custom {
            padding: 8px 30px 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #bdc3c7;
            background-color: white;
            cursor: pointer;
            font-weight: normal;
            user-select: none;
            min-width: 220px;
            position: relative;
        }
        .select-box-custom::after {
            content: "▼";
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: #7f8c8d;
        }
        .dropdown-checkboxes-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: white;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            padding: 5px 0;
        }
        .dropdown-checkboxes-list label {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }
        .dropdown-checkboxes-list label:hover {
            background-color: #f4f6f9;
        }
        .dropdown-checkboxes-list input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: #f16821;
        }

        .btn-excel {
            background-color: #1f7244;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-excel:hover { background-color: #154c2e; }

        .tabla-contenedor {
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }
        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
        tr:nth-child(even) { background-color: #f8fafc; }

        .btn-action-icon {
            border: none;
            padding: 4px 8px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 2px;
            transition: background 0.2s;
        }
        .btn-del { background-color: #e74c3c; color: white; }
        .btn-del:hover { background-color: #c0392b; }
        .btn-edt { background-color: #3498db; color: white; }
        .btn-edt:hover { background-color: #2980b9; }

        .btn-reset {
            display: none;
            background-color: #e74c3c;
            color: white;
            border: none;
            margin-top: 20px;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            float: left;
        }
        .btn-reset:hover { background-color: #c0392b; }

        /* --- VENTANA MODAL PARA EDICIÓN INTERNA DEL ADMIN --- */
        .modal-admin-edit {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
            width: 340px;
            text-align: center;
        }
        .modal-content h3 { margin-top: 0; color: #2c3e50; font-size: 18px; margin-bottom: 15px;}
        .modal-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .modal-row label { font-weight: bold; font-size: 13px; color: #34495e; width: 100px; text-align: right; margin-right: 10px; }
        .modal-row input, .modal-content select {
            padding: 8px; font-size: 14px; border: 2px solid #bdc3c7; border-radius: 6px; text-align: center; font-weight: bold; width: 180px; box-sizing: border-box;
        }
        .modal-row input[type="text"] { text-transform: uppercase; }
        .modal-buttons { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .btn-modal { padding: 10px 15px; font-weight: bold; font-size: 14px; border: none; border-radius: 6px; cursor: pointer; flex: 1; }
        .btn-modal-save { background-color: #2ecc71; color: white; }
        .btn-modal-cancel { background-color: #95a5a6; color: white; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="loginSection" class="login-box">
        <h2 style="color: #f16821; margin-top:0;">Acceso al Sistema</h2>
        <input type="text" id="userInput" placeholder="Usuario" style="text-transform:none; letter-spacing:0;">
        <input type="password" id="passInput" placeholder="Contraseña" style="text-transform:none; letter-spacing:0;">
        <button class="btn-login" onclick="procesarLogin()">Ingresar</button>
    </div>

    <div id="appContent">
        <div class="header-user-info">
            <span id="txtUsuarioActivo">Usuario: </span>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>

        <h1>UT Fuera de Tiempo</h1>
        
        <div class="semana-actual-box" id="infoSemanaActual">
            Calculando semana en curso...
        </div>
        
        <div class="grid-ut">
            <button class="btn-ut" onclick="mostrarFormulario('Ate', '517')">Ate <span>(517)</span></button>
            <button class="btn-ut" onclick="mostrarFormulario('Rex', '540')">Rex <span>(540)</span></button>
            <button class="btn-ut" onclick="mostrarFormulario('CD Stol', '954')">CD Stol <span>(954)</span></button>
            <button class="btn-ut" onclick="mostrarFormulario('CD Contrans', '956')">CD Contrans <span>(956)</span></button>
        </div>

        <div id="seccionFormulario" class="form-registro">
            <h3 id="tituloFormulario" style="margin:0; color:#2c3e50; text-align: center;"></h3>
            <div class="form-layout">
                <div class="inputs-col">
                    <div class="input-row">
                        <span class="label-field">N° Placa:</span>
                        <input type="text" id="placaUT" placeholder="XXX-XXX" autocomplete="off">
                    </div>
                    <div class="input-row">
                        <span class="label-field">NVS Afectadas:</span>
                        <input type="text" id="nvsAfectadas" placeholder="" autocomplete="off">
                    </div>
                </div>
                <button class="btn-guardar" onclick="guardarRegistro()">Registrar Llegada</button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #ddd; margin: 25px 0 15px 0;">

        <div class="seccion-control-tabla">
            <div class="filtros-box">
                <select id="filtroSede" onchange="actualizarTabla()">
                    <option value="TODOS">Ver Todas las Sedes</option>
                    <option value="Ate (517)">Ate (517)</option>
                    <option value="Rex (540)">Rex (540)</option>
                    <option value="CD Stol (954)">CD Stol (954)</option>
                    <option value="CD Contrans (956)">CD Contrans (956)</option>
                </select>
                
                <div class="multiselect-semanas">
                    <div class="select-box-custom" id="comboSemanasTitulo" onclick="conmutarDesplegableSemanas()">Ver Todas las Semanas</div>
                    <div class="dropdown-checkboxes-list" id="listaCheckboxesSemanas">
                        </div>
                </div>
            </div>
            <button class="btn-excel" onclick="exportarExcel()">📊 Descargar Excel</button>
        </div>

        <div class="tabla-contenedor">
            <table>
                <thead>
                    <tr>
                        <th>Sede / UT</th>
                        <th>N° Placa</th>
                        <th style="text-align: center;">NVS Afectadas</th>
                        <th>Semana</th>
                        <th>Fecha y Hora</th>
                        <th>Registrado Por</th>
                        <th id="thAccion" style="text-align: center; display: none;">Gestión</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <button id="botonResetSecreto" class="btn-reset" onclick="reiniciarTodo()">Limpiar Base de Datos</button>
        <div style="clear: both;"></div>
    </div>
</div>

<div id="modalEditAdmin" class="modal-admin-edit">
    <div class="modal-content">
        <h3>Modificar Registro</h3>
        <input type="hidden" id="editRowId">
        
        <div class="modal-row">
            <label>Sede / UT:</label>
            <select id="editModalSede">
                <option value="Ate (517)">Ate (517)</option>
                <option value="Rex (540)">Rex (540)</option>
                <option value="CD Stol (954)">CD Stol (954)</option>
                <option value="CD Contrans (956)">CD Contrans (956)</option>
            </select>
        </div>
        
        <div class="modal-row">
            <label>N° Placa:</label>
            <input type="text" id="editModalPlaca" placeholder="XXX-XXX" autocomplete="off">
        </div>
        
        <div class="modal-row">
            <label>NVS Afectadas:</label>
            <input type="text" id="editModalNVS" placeholder="00" autocomplete="off">
        </div>
        
        <div class="modal-row">
            <label>Fecha y Hora:</label>
            <input type="text" id="editModalTiempo" placeholder="DD/MM/AAAA HH:MM" autocomplete="off">
        </div>
        
        <div class="modal-buttons">
            <button class="btn-modal btn-modal-save" onclick="guardarEdicionModal()">Guardar</button>
            <button class="btn-modal btn-modal-cancel" onclick="cerrarEdicionModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // CONFIGURACIÓN ACTIVA DE TU PROYECTO FIREBASE
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyAKODz9wunLzimLxNXsALnPX4XO2mP5ZUk",
        authDomain: "utfueradetiempo.firebaseapp.com",
        databaseURL: "https://utfueradetiempo-default-rtdb.firebaseio.com",
        projectId: "utfueradetiempo",
        storageBucket: "utfueradetiempo.firebasestorage.app",
        messagingSenderId: "811201450412",
        appId: "1:811201450412:web:e6d1fd5a5810514c55aa09",
        measurementId: "G-WY9S53CDTL"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let usuarioLogueado = sessionStorage.getItem('ut_user_logged_v2') || "";
    let sedeSeleccionada = "";
    let codigoSeleccionado = "";
    let historial = []; 
    let etiquetaSemanaActualGlobal = "";
    let temporizadorInactividad;
    let temporizadorAlertaCierre;
    let semanasSeleccionadasGlobal = ["TODOS"];

    const inputPlaca = document.getElementById('placaUT');
    const inputNVS = document.getElementById('nvsAfectadas');
    const inputUsuarioLogin = document.getElementById('userInput');
    const inputPassLogin = document.getElementById('passInput');

    const modalPlaca = document.getElementById('editModalPlaca');
    const modalNVS = document.getElementById('editModalNVS');

    inputUsuarioLogin.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); inputPassLogin.focus(); }
    });
    inputPassLogin.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); procesarLogin(); }
    });

    // Calcular la semana de forma inmediata
    const infoSemInicial = obtenerDetalleSemana();
    etiquetaSemanaActualGlobal = infoSemInicial.etiqueta;

    verificarSesion();

    function procesarLogin() {
        const u = inputUsuarioLogin.value.trim().toUpperCase();
        const p = inputPassLogin.value.trim();

        if ((u === "DESPACHO" && p === "LMO528") || (u === "ADMIN" && p === "admin")) {
            usuarioLogueado = u;
            sessionStorage.setItem('ut_user_logged_v2', u);
            verificarSesion();
        } else {
            alert("Usuario o contraseña incorrectos.");
        }
    }

    function verificarSesion() {
        if (usuarioLogueado !== "") {
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('appContent').style.display = "block";
            document.getElementById('txtUsuarioActivo').innerText = `Usuario activo: ${usuarioLogueado}`;
            
            if (usuarioLogueado === "ADMIN") {
                document.getElementById('botonResetSecreto').style.display = "block";
                document.getElementById('thAccion').style.display = "table-cell";
            } else {
                document.getElementById('botonResetSecreto').style.display = "none";
                document.getElementById('thAccion').style.display = "none";
            }
            
            inicializarSincronizacionNube();
            reiniciarTemporizador();
        } else {
            document.getElementById('loginSection').style.display = "block";
            document.getElementById('appContent').style.display = "none";
            clearTimeout(temporizadorInactividad);
            clearTimeout(temporizadorAlertaCierre);
        }
    }

    function cerrarSesion() {
        usuarioLogueado = "";
        sessionStorage.removeItem('ut_user_logged_v2');
        inputUsuarioLogin.value = "";
        inputPassLogin.value = "";
        verificarSesion();
    }

    function inicializarSincronizacionNube() {
        db.ref('tardanzas').on('value', function(snapshot) {
            historial = [];
            snapshot.forEach(function(childSnapshot) {
                let item = childSnapshot.val();
                item.firebaseKey = childSnapshot.key; 
                historial.push(item);
            });
            construirFiltroSemanas();
            actualizarTabla();
        });
    }

    function reiniciarTemporizador() {
        if (usuarioLogueado === "") return;
        clearTimeout(temporizadorInactividad);
        clearTimeout(temporizadorAlertaCierre);

        temporizadorInactividad = setTimeout(function() {
            verificarYGuardarPorInactividad();

            temporizadorAlertaCierre = setTimeout(function() {
                cerrarSesion();
            }, 30000);

            alert("¡Atención! Tu sesión se cerrará automáticamente en 30 segundos por inactividad si no interactúas.");
            clearTimeout(temporizadorAlertaCierre);
            reiniciarTemporizador();
        }, 600000); 
    }

    function verificarYGuardarPorInactividad() {
        const placaValue = inputPlaca.value.trim();
        const nvsValue = inputNVS.value.trim();

        if (placaValue.length === 7 && nvsValue !== "" && sedeSeleccionada !== "") {
            const ahora = new Date();
            const fechaHoraFormateada = ahora.toLocaleDateString('es-PE') + ' ' + ahora.toLocaleTimeString('es-PE', {hour: '2-digit', minute:'2-digit'});

            const registroAutoguardado = {
                id: Date.now(),
                sede: `${sedeSeleccionada} (${codigoSeleccionado})`,
                placa: placaValue,
                nvs: nvsValue,
                semanaDetalle: etiquetaSemanaActualGlobal,
                tiempo: fechaHoraFormateada + " (AUTO)",
                usuario: usuarioLogueado
            };

            db.ref('tardanzas').push(registroAutoguardado);
        }
        inputPlaca.value = "";
        inputNVS.value = "";
        document.getElementById('seccionFormulario').style.display = "none";
    }

    window.addEventListener('mousemove', reiniciarTemporizador);
    window.addEventListener('keypress', reiniciarTemporizador);
    window.addEventListener('click', reiniciarTemporizador);
    window.addEventListener('scroll', reiniciarTemporizador);

    window.addEventListener('click', function(e) {
        if (!e.target.closest('.multiselect-semanas')) {
            document.getElementById('listaCheckboxesSemanas').style.display = "none";
        }
    });

    function conmutarDesplegableSemanas() {
        const lista = document.getElementById('listaCheckboxesSemanas');
        lista.style.display = (lista.style.display === "block") ? "none" : "block";
    }

    /* --- REGISTRO PRINCIPAL MÁSCARAS --- */
    inputPlaca.addEventListener('input', function(e) {
        let clean = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (clean.length > 6) clean = clean.substr(0, 6);
        if (clean.length > 3) {
            e.target.value = clean.substr(0, 3) + '-' + clean.substr(3);
        } else {
            e.target.value = clean;
        }
    });

    inputNVS.addEventListener('input', function(e) {
        let valor = e.target.value.replace(/[^0-9]/g, '');
        if (valor.length > 2) valor = valor.substr(0, 2);
        e.target.value = valor;
    });

    /* --- MODAL EDIT MÁSCARAS --- */
    modalPlaca.addEventListener('input', function(e) {
        let clean = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (clean.length > 6) clean = clean.substr(0, 6);
        if (clean.length > 3) {
            e.target.value = clean.substr(0, 3) + '-' + clean.substr(3);
        } else {
            e.target.value = clean;
        }
    });

    modalNVS.addEventListener('input', function(e) {
        let valor = e.target.value.replace(/[^0-9]/g, '');
        if (valor.length > 2) valor = valor.substr(0, 2);
        e.target.value = valor;
    });

    function obtenerDetalleSemana(fechaReferencia = new Date()) {
        const d = new Date(Date.UTC(fechaReferencia.getFullYear(), fechaReferencia.getMonth(), fechaReferencia.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        const numeroSemana = Math.ceil((((d - yearStart) / 86400000) + 1)/7);

        const lunes = new Date(fechaReferencia);
        const diaActual = fechaReferencia.getDay();
        const distanciaLunes = diaActual === 0 ? -6 : 1 - diaActual;
        lunes.setDate(fechaReferencia.getDate() + distanciaLunes);
        
        const domingo = new Date(lunes);
        domingo.setDate(lunes.getDate() + 6);

        const opciones = { day: 'numeric', month: 'long' };
        
        const meses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
        const textoLunes = `${lunes.getDate()} de ${meses[lunes.getMonth()]}`;
        const textoDomingo = `${domingo.getDate()} de ${meses[domingo.getMonth()]}`;

        const rangoEtiqueta = `Semana ${numeroSemana} (${textoLunes} - ${textoDomingo})`;
        
        const boxLabel = document.getElementById('infoSemanaActual');
        if (boxLabel) boxLabel.innerText = rangoEtiqueta;
        
        return { numero: numeroSemana, etiqueta: rangoEtiqueta };
    }

    function mostrarFormulario(sede, code) {
        sedeSeleccionada = sede;
        codigoSeleccionado = code;
        document.getElementById('tituloFormulario').innerText = `Registrar para: ${sede} (${code})`;
        document.getElementById('seccionFormulario').style.display = "block";
        inputPlaca.value = "";
        inputNVS.value = "";
        inputPlaca.focus();
    }

    function guardarRegistro() {
        const placaValue = inputPlaca.value.trim();
        const nvsValue = inputNVS.value.trim();

        if (placaValue.length !== 7) {
            alert("Por favor, introduce una placa válida (Ej: G5T-881).");
            inputPlaca.focus();
            return;
        }

        if (nvsValue === "") {
            alert("Por favor, ingresa las NVS Afectadas.");
            inputNVS.focus();
            return;
        }

        const ahora = new Date();
        const fechaHoraFormateada = ahora.toLocaleDateString('es-PE') + ' ' + ahora.toLocaleTimeString('es-PE', {hour: '2-digit', minute:'2-digit'});

        const nuevoRegistro = {
            id: Date.now(),
            sede: `${sedeSeleccionada} (${codigoSeleccionado})`,
            placa: placaValue,
            nvs: nvsValue,
            semanaDetalle: etiquetaSemanaActualGlobal,
            tiempo: fechaHoraFormateada,
            usuario: usuarioLogueado
        };

        db.ref('tardanzas').push(nuevoRegistro);
        
        inputPlaca.value = "";
        inputNVS.value = "";
        document.getElementById('seccionFormulario').style.display = "none";
    }

    function construirFiltroSemanas() {
        const contenedorLista = document.getElementById('listaCheckboxesSemanas');
        let semanasUnicas = [];
        
        historial.forEach(item => {
            if (!semanasUnicas.includes(item.semanaDetalle)) {
                semanasUnicas.push(item.semanaDetalle);
            }
        });

        if (!semanasUnicas.includes(etiquetaSemanaActualGlobal)) {
            semanasUnicas.push(etiquetaSemanaActualGlobal);
        }

        semanasUnicas.sort();
        contenedorLista.innerHTML = "";

        const labelTodos = document.createElement('label');
        const checkTodos = document.createElement('input');
        checkTodos.type = "checkbox";
        checkTodos.value = "TODOS";
        checkTodos.checked = semanasSeleccionadasGlobal.includes("TODOS");
        checkTodos.onchange = manejarCambioCheckSemanas;
        labelTodos.appendChild(checkTodos);
        labelTodos.appendChild(document.createTextNode(" Ver Todas las Semanas"));
        contenedorLista.appendChild(labelTodos);

        semanasUnicas.forEach(sem => {
            const labelSem = document.createElement('label');
            const checkSem = document.createElement('input');
            checkSem.type = "checkbox";
            checkSem.value = sem;
            checkSem.checked = !semanasSeleccionadasGlobal.includes("TODOS") && semanasSeleccionadasGlobal.includes(sem);
            checkSem.onchange = manejarCambioCheckSemanas;
            labelSem.appendChild(checkSem);
            labelSem.appendChild(document.createTextNode(" " + sem));
            contenedorLista.appendChild(labelSem);
        });

        actualizarTextoTituloSemanas();
    }

    function manejarCambioCheckSemanas(e) {
        const valor = e.target.value;
        const checked = e.target.checked;
        const checkboxes = document.getElementById('listaCheckboxesSemanas').querySelectorAll('input[type="checkbox"]');

        if (valor === "TODOS" && checked) {
            checkboxes.forEach(chk => { if (chk.value !== "TODOS") chk.checked = false; });
            semanasSeleccionadasGlobal = ["TODOS"];
        } else if (valor !== "TODOS" && checked) {
            checkboxes[0].checked = false;
            semanasSeleccionadasGlobal = semanasSeleccionadasGlobal.filter(s => s !== "TODOS");
            if (!semanasSeleccionadasGlobal.includes(valor)) semanasSeleccionadasGlobal.push(valor);
        } else if (!checked) {
            semanasSeleccionadasGlobal = semanasSeleccionadasGlobal.filter(s => s !== valor);
        }

        if (semanasSeleccionadasGlobal.length === 0) {
            checkboxes[0].checked = true;
            semanasSeleccionadasGlobal = ["TODOS"];
        }

        actualizarTextoTituloSemanas();
        actualizarTabla();
    }

    function actualizarTextoTituloSemanas() {
        const titulo = document.getElementById('comboSemanasTitulo');
        if (semanasSeleccionadasGlobal.includes("TODOS")) {
            titulo.innerText = "Ver Todas las Semanas";
        } else if (semanasSeleccionadasGlobal.length === 1) {
            titulo.innerText = semanasSeleccionadasGlobal[0].split(' ')[0] + ' ' + semanasSeleccionadasGlobal[0].split(' ')[1];
        } else {
            titulo.innerText = `${semanasSeleccionadasGlobal.length} Semanas Seleccionadas`;
        }
    }

    function actualizarTabla() {
        const tbody = document.getElementById('cuerpoTabla');
        const filterSede = document.getElementById('filtroSede').value;
        tbody.innerHTML = "";

        historial.forEach((item) => {
            const cumpleSede = (filterSede === "TODOS" || item.sede === filterSede);
            const cumpleSemana = (semanasSeleccionadasGlobal.includes("TODOS") || semanasSeleccionadasGlobal.includes(item.semanaDetalle));

            if (cumpleSede && cumpleSemana) {
                const fila = document.createElement('tr');
                
                let celdaAccion = "";
                if (usuarioLogueado === "ADMIN") {
                    celdaAccion = `
                        <td style="text-align:center;">
                            <button class="btn-action-icon btn-edt" onclick="abrirEdicionModal('${item.firebaseKey}')" title="Modificar datos del registro">✏️</button>
                            <button class="btn-action-icon btn-del" onclick="eliminarRegistroAdmin('${item.firebaseKey}')" title="Eliminar registro">❌</button>
                        </td>`;
                }

                fila.innerHTML = `
                    <td>${item.sede}</td>
                    <td style="font-weight:bold; letter-spacing:0.5px;">${item.placa}</td>
                    <td style="color:#e74c3c; font-weight:bold; text-align:center;">${item.nvs}</td>
                    <td>${item.semanaDetalle.split(' ')[0] + ' ' + item.semanaDetalle.split(' ')[1]}</td>
                    <td>${item.tiempo}</td>
                    <td style="font-size:12px; font-weight:bold; color:#7f8c8d;">${item.usuario}</td>
                    ${celdaAccion}
                `;
                tbody.appendChild(fila);
            }
        });

        if (tbody.innerHTML === "") {
            tbody.innerHTML = `<tr><td colspan="${usuarioLogueado === 'ADMIN' ? 7 : 6}" style="text-align:center; color:#999; padding:20px;">No hay registros acumulados.</td></tr>`;
        }
    }

    function eliminarRegistroAdmin(firebaseKey) {
        if (confirm("¿Estás completamente seguro de que deseas borrar esta fila del historial?")) {
            db.ref('tardanzas').child(firebaseKey).remove();
        }
    }

    function abrirEdicionModal(firebaseKey) {
        const registro = historial.find(item => item.firebaseKey === firebaseKey);
        if (!registro) return;

        document.getElementById('editRowId').value = registro.firebaseKey; 
        document.getElementById('editModalSede').value = registro.sede;
        modalPlaca.value = registro.placa;
        modalNVS.value = registro.nvs;
        document.getElementById('editModalTiempo').value = registro.tiempo;

        document.getElementById('modalEditAdmin').style.display = "flex";
    }

    function cerrarEdicionModal() {
        document.getElementById('modalEditAdmin').style.display = "none";
    }

    function guardarEdicionModal() {
        const firebaseKey = document.getElementById('editRowId').value;
        
        const sedeVal = document.getElementById('editModalSede').value;
        const placaVal = modalPlaca.value.trim();
        const nvsVal = modalNVS.value.trim();
        const tiempoVal = document.getElementById('editModalTiempo').value.trim();

        if (placaVal.length !== 7) {
            alert("Estructura de placa incorrecta. Debe contener exactamente 6 dígitos (Ej: XXX-XXX).");
            modalPlaca.focus();
            return;
        }

        if (nvsVal === "") {
            alert("El campo NVS no puede estar vacío.");
            modalNVS.focus();
            return;
        }

        if (tiempoVal === "") {
            alert("El campo Fecha y Hora no puede estar vacío.");
            document.getElementById('editModalTiempo').focus();
            return;
        }

        db.ref('tardanzas').child(firebaseKey).update({
            sede: sedeVal,
            placa: placaVal,
            nvs: nvsVal,
            tiempo: tiempoVal
        });

        cerrarEdicionModal();
        alert("El registro ha sido actualizado con éxito.");
    }

    function exportarExcel() {
        if (historial.length === 0) {
            alert("No hay datos para exportar.");
            return;
        }

        let csvContent = "\uFEFF"; 
        csvContent += "Sede / UT;N° Placa;NVS Afectadas;Semana;Fecha y Hora;Registrado Por\n";

        const filterSede = document.getElementById('filtroSede').value;

        historial.forEach((item) => {
            const cumpleSede = (filterSede === "TODOS" || item.sede === filterSede);
            const cumpleSemana = (semanasSeleccionadasGlobal.includes("TODOS") || semanasSeleccionadasGlobal.includes(item.semanaDetalle));

            if (cumpleSede && cumpleSemana) {
                csvContent += `"${item.sede}";"${item.placa}";"${item.nvs}";"${item.semanaDetalle}";"${item.tiempo}";"${item.usuario}"\n`;
            }
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Reporte_Consolidado_UT.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function reiniciarTodo() {
        if (confirm("¿Deseas vaciar por completo TODA la base de datos acumulada históricamente en la nube?")) {
            db.ref('tardanzas').remove();
        }
    }
</script>
